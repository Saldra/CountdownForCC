<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Countdown</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0f172a;
  font-family:Arial, sans-serif;
}

.countdown{
  display:flex;
  gap:20px;
}

.box{
  background:#1e293b;
  color:white;
  padding:20px;
  width:90px;
  text-align:center;
  border-radius:10px;
}

.number{
  font-size:32px;
  font-weight:bold;
}

.label{
  font-size:12px;
  color:#94a3b8;
}
</style>
</head>

<body>

<div class="countdown">
  <div class="box">
    <div class="number">10</div>
    <div class="label">JOURS</div>
  </div>
  <div class="box">
    <div class="number">05</div>
    <div class="label">HEURES</div>
  </div>
  <div class="box">
    <div class="number">32</div>
    <div class="label">MIN</div>
  </div>
  <div class="box">
    <div class="number">18</div>
    <div class="label">SEC</div>
  </div>
</div>

</body>
</html>
